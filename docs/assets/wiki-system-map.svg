<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">MedPaper Assistant system map</title>
  <desc id="desc">A layered map connecting researchers, agents, MCP tools, evidence, writing artifacts, quality gates, and audit records.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1520" y2="940" gradientUnits="userSpaceOnUse">
      <stop stop-color="#083A38"/>
      <stop offset="1" stop-color="#102C3D"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity=".45"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="1600" height="980" rx="44" fill="url(#bg)"/>
  <circle cx="1420" cy="110" r="180" fill="#F59E0B" fill-opacity=".08"/>
  <circle cx="160" cy="870" r="230" fill="#2DD4BF" fill-opacity=".07"/>
  <text x="92" y="92" fill="#99F6E4" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="800" letter-spacing="4">RESEARCH → EVIDENCE → WRITING → AUDIT</text>
  <text x="92" y="146" fill="#F8FAFC" font-family="Inter,Arial,sans-serif" font-size="48" font-weight="800">One workspace. Many agents. One evidence contract.</text>

  <g filter="url(#shadow)">
    <rect x="92" y="226" width="300" height="218" rx="28" fill="#F8FAFC" fill-opacity=".08" stroke="#5EEAD4" stroke-opacity=".4"/>
    <text x="126" y="272" fill="#5EEAD4" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800">HUMAN + AGENTS</text>
    <text x="126" y="323" fill="#F8FAFC" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="800">Researcher</text>
    <text x="126" y="365" fill="#CBD5E1" font-family="Inter,Arial,sans-serif" font-size="21">Claude Code · Codex</text>
    <text x="126" y="398" fill="#CBD5E1" font-family="Inter,Arial,sans-serif" font-size="21">OpenClaw · Copilot</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="482" y="226" width="350" height="218" rx="28" fill="url(#accent)" fill-opacity=".16" stroke="#5EEAD4" stroke-opacity=".55"/>
    <text x="518" y="272" fill="#99F6E4" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800">SHARED CONTRACT</text>
    <text x="518" y="323" fill="#F8FAFC" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="800">Academic harness</text>
    <text x="518" y="365" fill="#DDFCF7" font-family="Inter,Arial,sans-serif" font-size="21">phase gates · source roles</text>
    <text x="518" y="398" fill="#DDFCF7" font-family="Inter,Arial,sans-serif" font-size="21">checkpoints · review loops</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="922" y="226" width="586" height="218" rx="28" fill="#F8FAFC" fill-opacity=".08" stroke="#FBBF24" stroke-opacity=".55"/>
    <text x="958" y="272" fill="#FBBF24" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800">MCP ORCHESTRATION</text>
    <text x="958" y="323" fill="#F8FAFC" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="800">mdpaper · PubMed · assets</text>
    <text x="958" y="365" fill="#CBD5E1" font-family="Inter,Arial,sans-serif" font-size="21">118 full tools · 22 compact</text>
    <text x="958" y="398" fill="#CBD5E1" font-family="Inter,Arial,sans-serif" font-size="21">Zotero · CGU · diagrams</text>
  </g>

  <path d="M392 335H472" stroke="#5EEAD4" stroke-width="7" stroke-linecap="round"/>
  <path d="M832 335H912" stroke="#5EEAD4" stroke-width="7" stroke-linecap="round"/>
  <path d="m462 323 16 12-16 12M902 323l16 12-16 12" fill="none" stroke="#5EEAD4" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="92" y="548" width="1416" height="284" rx="32" fill="#071F2A" fill-opacity=".68" stroke="#94A3B8" stroke-opacity=".25"/>
    <text x="126" y="596" fill="#94A3B8" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800">FILESYSTEM AS SHARED, AUDITABLE STATE</text>
    <rect x="126" y="640" width="290" height="132" rx="22" fill="#0F766E" fill-opacity=".28" stroke="#5EEAD4" stroke-opacity=".45"/>
    <text x="156" y="686" fill="#99F6E4" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800">EVIDENCE</text>
    <text x="156" y="730" fill="#F8FAFC" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="700">references + full text</text>
    <rect x="450" y="640" width="290" height="132" rx="22" fill="#0F766E" fill-opacity=".28" stroke="#5EEAD4" stroke-opacity=".45"/>
    <text x="480" y="686" fill="#99F6E4" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800">WRITING</text>
    <text x="480" y="730" fill="#F8FAFC" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="700">concept · draft · assets</text>
    <rect x="774" y="640" width="290" height="132" rx="22" fill="#F59E0B" fill-opacity=".2" stroke="#FBBF24" stroke-opacity=".5"/>
    <text x="804" y="686" fill="#FDE68A" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800">QUALITY</text>
    <text x="804" y="730" fill="#F8FAFC" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="700">79 checks + gates</text>
    <rect x="1098" y="640" width="376" height="132" rx="22" fill="#F8FAFC" fill-opacity=".07" stroke="#CBD5E1" stroke-opacity=".35"/>
    <text x="1128" y="686" fill="#CBD5E1" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800">MEMORY + AUDIT</text>
    <text x="1128" y="730" fill="#F8FAFC" font-family="Inter,Arial,sans-serif" font-size="23" font-weight="700">telemetry + checkpoints</text>
  </g>

  <path d="M1215 444V522H798V540" fill="none" stroke="#FBBF24" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="798" cy="540" r="10" fill="#FBBF24"/>
  <text x="92" y="912" fill="#CBD5E1" font-family="Inter,Arial,sans-serif" font-size="21">Evidence is never inferred from an exemplar. Quality failures loop back into the next writing round.</text>
</svg>
