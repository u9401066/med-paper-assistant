<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Evidence and exemplar boundary</title>
  <desc id="desc">Verified evidence flows into claims and citations while exemplar papers only calibrate structure and style.</desc>
  <rect width="1600" height="900" rx="42" fill="#F4FBF9"/>
  <text x="90" y="92" fill="#0F766E" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="800" letter-spacing="3">CLAIM–EVIDENCE INTEGRITY</text>
  <text x="90" y="150" fill="#16302B" font-family="Inter,Arial,sans-serif" font-size="48" font-weight="800">Two lanes enter the draft. Only one supports facts.</text>
  <rect x="90" y="230" width="620" height="470" rx="30" fill="#DFF7F1" stroke="#14B8A6" stroke-width="3"/>
  <text x="132" y="286" fill="#0F766E" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="800">EVIDENCE LANE</text>
  <rect x="132" y="328" width="536" height="86" rx="18" fill="#FFFFFF"/>
  <text x="164" y="380" fill="#16302B" font-family="Inter,Arial,sans-serif" font-size="27" font-weight="700">PubMed metadata + full text</text>
  <rect x="132" y="438" width="536" height="86" rx="18" fill="#FFFFFF"/>
  <text x="164" y="490" fill="#16302B" font-family="Inter,Arial,sans-serif" font-size="27" font-weight="700">User primary data + methods</text>
  <rect x="132" y="548" width="536" height="102" rx="18" fill="#0F766E"/>
  <text x="164" y="593" fill="#FFFFFF" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="800">May support claims and citations</text>
  <text x="164" y="625" fill="#CCFBF1" font-family="Inter,Arial,sans-serif" font-size="19">after independent verification</text>

  <rect x="890" y="230" width="620" height="470" rx="30" fill="#FFF8E7" stroke="#F59E0B" stroke-width="3"/>
  <text x="932" y="286" fill="#B45309" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="800">EXEMPLAR LANE</text>
  <rect x="932" y="328" width="536" height="86" rx="18" fill="#FFFFFF"/>
  <text x="964" y="380" fill="#3B2A12" font-family="Inter,Arial,sans-serif" font-size="27" font-weight="700">Structure + argument map</text>
  <rect x="932" y="438" width="536" height="86" rx="18" fill="#FFFFFF"/>
  <text x="964" y="490" fill="#3B2A12" font-family="Inter,Arial,sans-serif" font-size="27" font-weight="700">Reporting + style calibration</text>
  <rect x="932" y="548" width="536" height="102" rx="18" fill="#B45309"/>
  <text x="964" y="593" fill="#FFFFFF" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="800">Never evidence or citation credit</text>
  <text x="964" y="625" fill="#FEF3C7" font-family="Inter,Arial,sans-serif" font-size="19">never verbatim or lightly paraphrased</text>

  <path d="M710 470H870" stroke="#14B8A6" stroke-width="7" stroke-linecap="round"/>
  <path d="m854 455 20 15-20 15" fill="none" stroke="#14B8A6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="790" cy="470" r="44" fill="#16302B"/>
  <text x="773" y="480" fill="#FFFFFF" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="800">≠</text>

  <rect x="340" y="756" width="920" height="78" rx="22" fill="#16302B"/>
  <text x="800" y="806" text-anchor="middle" fill="#FFFFFF" font-family="Inter,Arial,sans-serif" font-size="25" font-weight="700">Every source role is recorded before drafting begins.</text>
</svg>
