# ═══════════════════════════════════════════════════════════════
# Journal Profile: Regional Anesthesia & Pain Medicine
# ═══════════════════════════════════════════════════════════════
# Generated: 2026-03-17
# Source: https://rapm.bmj.com/pages/authors/
#
# Usage: cp templates/journal-profiles/rapm.yaml \
#           projects/{slug}/journal-profile.yaml
#
# ⚠️  Always verify against the latest author guidelines URL above.
#     Journal requirements may change without notice.
# ═══════════════════════════════════════════════════════════════

journal:
  name: Regional Anesthesia & Pain Medicine
  abbreviation: Reg Anesth Pain Med
  issn: 1098-7339
  issn_online: 1532-8651
  publisher: BMJ Publishing Group / ASRA Pain Medicine
  submission_url: https://mc.manuscriptcentral.com/rapm
  guidelines_url: https://rapm.bmj.com/pages/authors/
authors: []
paper:
  type: original-research
  sections:
  - name: Title Page
    required: true
  - name: Abstract
    required: true
    structured: true
    word_limit: 250
  - name: Key Messages
    required: true
  - name: Introduction
    required: true
    word_limit: 500
  - name: Methods
    required: true
  - name: Results
    required: true
  - name: Discussion
    required: true
word_limits:
  total_manuscript: 3000
  abstract: 250
  title_characters: 150
  running_title_characters: 50
  introduction_max: 500
assets:
  figures_max: 5
  tables_max: 5
  total_display_items_max: 5
  supplementary_allowed: true
  figure_formats:
  - TIFF
  - PDF
  - PNG
  figure_dpi: 300
  table_format: editable
references:
  style: vancouver
  csl: ''
  max_references: 30
  max_authors_before_etal: 6
  doi_required: false
  pmid_preferred: true
  reference_limits:
    original-research: 30
    review-article: 75
    systematic-review: 75
    meta-analysis: 75
    case-report: 25
    letter: 6
  minimum_reference_limits:
    original-research: 15
    review-article: 30
    case-report: 5
    letter: 0
required_documents:
  cover_letter: true
  highlights: false
  graphical_abstract: false
  author_contributions: true
  conflict_of_interest: true
  funding_statement: true
  ethics_statement: true
  data_availability: true
  keywords:
    required: true
    count: 3-5
  key_messages: true
reporting_guidelines:
  checklist: required (EQUATOR network guidelines)
  registration_required: true
  protocol_registration: PROSPERO (for systematic reviews)
pipeline:
  hook_a_max_rounds: 3
  hook_b_max_rounds: 2
  hook_c_max_rounds: 3
  review_max_rounds: 3
  autonomous_review:
    enabled: true
    reviewer_perspectives:
    - methodology_expert
    - domain_specialist
    - statistician
    - editor
    quality_threshold: 7
  tolerance:
    word_percent: 20
    citation_density_strict: true
  section_brief:
    enabled: true
    paragraph_level: true
    enforce_must_cite: true
  changelog: []
  writing:
    language: en
    tone: formal-academic
    anti_ai_strictness: high
    citation_density:
      introduction: 100
      methods: 0
      results: 0
      discussion: 150
  assets:
    auto_generate_table_one: true
    auto_generate_plots: true
    flow_diagram_tool: drawio
    fallback_to_description: true
    agent_initiated:
      enabled: true
      allowed_types:
      - literature_summary_table
      - comparison_table
      - timeline_figure
      - concept_diagram
      must_respect_limits: true
abstract:
  structured: true
  headings: Background, Methods, Results, Conclusions
other_article_types:
  case-report:
    word_limit: 2000
    abstract: 250
    references: 25
  review-article:
    word_limit: 3500
    abstract: 250
    references: 75
  letter:
    word_limit: 600
    abstract: 0
    references: 6
  editorial:
    word_limit: 1500
    abstract: 0
    references: 10
  brief-technical-report:
    word_limit: 2500
    abstract: 250
    references: 20
  research-letter:
    word_limit: 600
    abstract: 0
    references: 6
  education-article:
    word_limit: 4000
    abstract: 0
    references: 20
