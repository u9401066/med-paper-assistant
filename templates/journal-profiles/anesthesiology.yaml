# ═══════════════════════════════════════════════════════════════
# Journal Profile: Anesthesiology
# ═══════════════════════════════════════════════════════════════
# Generated: 2026-03-17
# Source: https://pubs.asahq.org/anesthesiology/pages/instructions-for-authors
#
# Usage: cp templates/journal-profiles/anesthesiology.yaml \
#           projects/{slug}/journal-profile.yaml
#
# ⚠️  Always verify against the latest author guidelines URL above.
#     Journal requirements may change without notice.
# ═══════════════════════════════════════════════════════════════

journal:
  name: Anesthesiology
  abbreviation: Anesthesiology
  issn: 0003-3022
  issn_online: 1528-1175
  publisher: Wolters Kluwer / American Society of Anesthesiologists
  submission_url: https://www.editorialmanager.com/aln/
  guidelines_url: https://pubs.asahq.org/anesthesiology/pages/instructions-for-authors
authors: []
paper:
  type: original-research
  sections:
  - name: Title Page
    required: true
  - name: Abstract
    required: true
    structured: true
    word_limit: 350
  - name: Introduction
    required: true
  - name: Methods
    required: true
  - name: Results
    required: true
  - name: Discussion
    required: true
word_limits:
  total_manuscript: 4500
  abstract: 350
  title_characters: 150
  running_title_characters: 50
assets:
  figures_max: 8
  tables_max: 8
  total_display_items_max: 8
  supplementary_allowed: true
  figure_formats:
  - TIFF
  - EPS
  - PDF
  figure_dpi: 300
  table_format: editable
references:
  style: vancouver
  csl: ''
  max_references: 50
  max_authors_before_etal: 6
  doi_required: false
  pmid_preferred: true
  reference_limits:
    original-research: 50
    review-article: 80
    systematic-review: 80
    meta-analysis: 80
    case-report: 15
    letter: 10
  minimum_reference_limits:
    original-research: 25
    review-article: 40
    case-report: 5
    letter: 0
required_documents:
  cover_letter: true
  highlights: false
  graphical_abstract: false
  author_contributions: true
  conflict_of_interest: true
  funding_statement: true
  ethics_statement: true
  data_availability: true
  keywords:
    required: true
    count: 4-6
reporting_guidelines:
  checklist: required (CONSORT/STROBE/PRISMA as appropriate)
  registration_required: true
pipeline:
  hook_a_max_rounds: 3
  hook_b_max_rounds: 2
  hook_c_max_rounds: 3
  review_max_rounds: 3
  autonomous_review:
    enabled: true
    reviewer_perspectives:
    - methodology_expert
    - domain_specialist
    - statistician
    - editor
    quality_threshold: 7
  tolerance:
    word_percent: 20
    citation_density_strict: true
  section_brief:
    enabled: true
    paragraph_level: true
    enforce_must_cite: true
  changelog: []
  writing:
    language: en
    tone: formal-academic
    anti_ai_strictness: high
    citation_density:
      introduction: 100
      methods: 0
      results: 0
      discussion: 150
  assets:
    auto_generate_table_one: true
    auto_generate_plots: true
    flow_diagram_tool: drawio
    fallback_to_description: true
    agent_initiated:
      enabled: true
      allowed_types:
      - literature_summary_table
      - comparison_table
      - timeline_figure
      - concept_diagram
      must_respect_limits: true
abstract:
  structured: true
  headings: Background, Methods, Results, Conclusions
other_article_types:
  case-report:
    word_limit: 2000
    abstract: 200
    references: 15
  review-article:
    word_limit: 5000
    abstract: 350
    references: 80
  letter:
    word_limit: 750
    abstract: 0
    references: 10
  editorial:
    word_limit: 2000
    abstract: 0
    references: 20
