name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags: v0.3.0, v1.0.0, etc.
  workflow_dispatch:

permissions:
  contents: write  # For creating GitHub Releases

jobs:
  # ──────────────────────────────────────────────────────
  # 1. Validate tag version matches source files
  # ──────────────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "📌 Tag version: $TAG_VERSION"

      - name: Validate pyproject.toml version
        run: |
          PYPI_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PYPI_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch: pyproject.toml=$PYPI_VERSION, tag=$TAG_VERSION"
            echo "   Run: ./scripts/bump-version.sh $TAG_VERSION"
            exit 1
          fi
          echo "✅ pyproject.toml version: $PYPI_VERSION"

      - name: Validate package.json version
        run: |
          VSX_VERSION=$(node -p "require('./vscode-extension/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$VSX_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch: package.json=$VSX_VERSION, tag=$TAG_VERSION"
            echo "   Run: ./scripts/bump-version.sh $TAG_VERSION"
            exit 1
          fi
          echo "✅ package.json version: $VSX_VERSION"

  smoke-cross-platform:
    name: "Cross-Platform Smoke (${{ matrix.label }})"
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: ubuntu-latest
          - os: windows-latest
            label: windows-latest
          - os: macos-14
            label: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        shell: bash
        run: |
          uv sync --all-extras
          uv pip install -e integrations/pubmed-search-mcp
          uv pip install -e integrations/cgu

      - name: Install VS Code extension dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Verify integration helper (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ./scripts/setup-integrations.sh
          ./scripts/start-drawio.sh

      - name: Verify integration helper (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/setup-integrations.ps1
          ./scripts/start-drawio.ps1

      - name: Run Python and MCP smoke tests
        shell: bash
        run: uv run pytest tests/test_export_pipeline.py tests/test_figure_embedding.py tests/test_config_paths.py tests/test_copilot_hook_guard.py tests/test_mcp_integration.py -q

      - name: Verify MCP server boots directly
        run: uv run python scripts/verify_mcp_server_boot.py

      - name: Run VS Code extension smoke tests
        working-directory: vscode-extension
        run: npm test -- --run src/test/uvManager.test.ts src/test/packaging.test.ts src/test/extensionHelpers.test.ts

  # ──────────────────────────────────────────────────────
  # 2. Run tests before publishing
  # ──────────────────────────────────────────────────────
  test-python:
    runs-on: ubuntu-latest
    needs: [validate, smoke-cross-platform]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          uv sync --all-extras
          uv pip install -e integrations/pubmed-search-mcp
          uv pip install -e integrations/cgu

      - name: Run tests
        run: uv run pytest tests/ -x -q --timeout=60 -m "not integration and not slow"

  vsx-bundle-drift:
    runs-on: ubuntu-latest
    needs: [validate, smoke-cross-platform]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Check committed bundle drift
        working-directory: vscode-extension
        run: npm run bundle:check

  build-artifacts:
    runs-on: ubuntu-latest
    needs: [validate, smoke-cross-platform, test-python, vsx-bundle-drift]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install VS Code extension dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Sync bundled assets for artifact build
        working-directory: vscode-extension
        run: npm run bundle:sync

      - name: Sync Python MCP sources for VSIX
        working-directory: vscode-extension
        run: npm run bundle:sync-python

      - name: Compile TypeScript
        working-directory: vscode-extension
        run: npm run compile

      - name: Run extension tests
        working-directory: vscode-extension
        run: npm test

      - name: Package VSIX
        working-directory: vscode-extension
        run: npm run package

      - name: Validate packaged extension
        working-directory: vscode-extension
        run: npm run validate -- --skip-tests

      - name: Build Python distribution artifacts
        run: uv build

      - name: Upload Python dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: medpaper-python-dist-${{ needs.validate.outputs.version }}
          path: dist/*

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: medpaper-assistant-${{ needs.validate.outputs.version }}.vsix
          path: vscode-extension/*.vsix

  # ──────────────────────────────────────────────────────
  # 3. Publish to PyPI (Trusted Publishing)
  # ──────────────────────────────────────────────────────
  publish-pypi:
    runs-on: ubuntu-latest
    needs: [validate, build-artifacts]
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - name: Download Python dist artifact
        uses: actions/download-artifact@v4
        with:
          name: medpaper-python-dist-${{ needs.validate.outputs.version }}
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
        # Uses trusted publishing - no API token needed!
        # Configure at: https://pypi.org/manage/project/med-paper-assistant/settings/publishing/

  # ──────────────────────────────────────────────────────
  # 4. Publish to VS Code Marketplace
  # ──────────────────────────────────────────────────────
  publish-vsx:
    runs-on: ubuntu-latest
    needs: [validate, build-artifacts, publish-pypi]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: medpaper-assistant-${{ needs.validate.outputs.version }}.vsix
          path: release-assets

      - name: Publish to VS Marketplace
        working-directory: vscode-extension
        run: |
          VSIX_PATH=$(find ../release-assets -name '*.vsix' -print -quit)
          npx @vscode/vsce publish --packagePath "$VSIX_PATH" -p ${{ secrets.VSCE_PAT }}

  # ──────────────────────────────────────────────────────
  # 5. Create GitHub Release
  # ──────────────────────────────────────────────────────
  github-release:
    runs-on: ubuntu-latest
    needs: [validate, publish-vsx]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: medpaper-assistant-${{ needs.validate.outputs.version }}.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.vsix"
          body: |
            ## 📦 Installation

            ### PyPI
            ```bash
            pip install med-paper-assistant==${{ needs.validate.outputs.version }}
            ```

            ### VS Code Marketplace
            Search "MedPaper Assistant" in VS Code Extensions, or:
            ```bash
            code --install-extension u9401066.medpaper-assistant
            ```
